<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>findingfocus.music</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="icon" href="/favicon.ico" sizes="any">
<link rel="icon" href="/favicon.png" type="image/png">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="192x192" href="/android-chrome-192x192.png">
<link rel="icon" type="image/png" sizes="512x512" href="/android-chrome-512x512.png">
<link rel="manifest" href="/site.webmanifest">
<style>
  :root{
    --bg: #0E0C0B;
    --panel: #17140F;
    --panel-line: #2A241C;
    --mist-far: #3A4148;
    --mist-mid: #262A2E;
    --mist-near: #14131299;
    --text: #E8DCC4;
    --text-dim: #8C8172;
    --amber: #C98553;
    --sage: #7C9585;
    --plum: #8E7093;
    --statusbar: #D8C9A0;
    --mono: 'JetBrains Mono', monospace;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{ height:100%; }
  body{
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    min-height: 100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding: 24px;
    position: relative;
    overflow: hidden;
  }

  .backdrop{
	    position: fixed; inset: 0;
	      z-index: 0;
	        background-image: 
			    linear-gradient(180deg, rgba(14,20,16,0.90) 0%, rgba(14,18,15,0.93) 100%),
		    url('overworld.webp');
		      background-size: 150% auto;
		        background-position: 10% 40%;
			  background-repeat: no-repeat;
  }

  .app{
	    position: relative;
	      z-index: 2;
	        width: 100%;
		  max-width: 560px;
		    min-width: 0;
		      background: rgba(14,12,11,0.72);
		        border: 1px solid var(--panel-line);
			  border-radius: 6px;
			    backdrop-filter: blur(6px);
			      overflow: hidden;
			        box-shadow: 0 30px 80px rgba(0,0,0,0.5);
  }

  /* ---- tab bar (mimics editor tabs) ---- */
  .tabs{
	    display:flex;
	      background: var(--panel);
	        border-bottom: 1px solid var(--panel-line);
		  overflow-x: auto;
		    scrollbar-width: none;
		      -ms-overflow-style: none;
  }
  .tabs::-webkit-scrollbar{
	    display: none;
  }
  .tab{
    padding: 10px 18px;
    font-size: 12px;
    color: var(--text-dim);
    border-right: 1px solid var(--panel-line);
    cursor: pointer;
    white-space: nowrap;
    display:flex;
    align-items:center;
    gap: 8px;
    transition: all 0.15s ease;
  }
  .tab .dot{ width:6px; height:6px; border-radius:50%; background: var(--panel-line); }
  .tab.active{ color: var(--amber); background: rgba(201,133,83,0.06); }
  .tab.active .dot{ background: var(--amber); box-shadow: 0 0 6px var(--amber); }
  .tab:hover{ color: var(--text); }

  /* ---- now playing / comment line ---- */
  .body-pad{ padding: 28px 24px 20px; }
  .comment{
    color: var(--sage);
    font-size: 12.5px;
    margin-bottom: 4px;
  }
  .now-playing{
    font-size: 20px;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 2px;
  }
  .now-playing .kw{ color: var(--plum); }
  .code-line{
	    font-size: 12px;
	      color: var(--text-dim);
	        margin-bottom: 26px;
		  white-space: nowrap;
		    overflow: hidden;
		      text-overflow: ellipsis;
		        max-width: 100%;
			  cursor: pointer;
  }
  .code-overlay{
	    display: none;
	      position: fixed;
	        inset: 0;
		  background: rgba(0,0,0,0.7);
		    z-index: 999;
		      overflow-y: auto;
		        text-align: center;
			  padding: 40px 24px;
  }
  .code-overlay.show{ display: block; }
  .code-overlay::before{
	    content: '';
	      display: inline-block;
	        height: 100%;
		  vertical-align: middle;
  }
  .code-overlay-box{
	    display: inline-block;
	      vertical-align: middle;
	        text-align: left;
		  background: var(--panel);
		    border: 1px solid var(--panel-line);
		      border-radius: 6px;
		        padding: 20px;
			  font-size: 13px;
			    color: var(--text);
			      max-width: 400px;
			        width: 90%;
				  word-break: break-word;
				    white-space: pre-line;
				      position: relative;
  }

  .copy-btn{
	    position: absolute;
	      top: 10px;
	        right: 10px;
		  width: 30px;
		    height: 30px;
		      display: flex;
		        align-items: center;
			  justify-content: center;
			    background: var(--panel);
			      border: 1px solid var(--panel-line);
			        color: var(--text-dim);
				  padding: 0;
				    border-radius: 4px;
				      cursor: pointer;
  }
  .copy-btn:hover{ color: var(--amber); border-color: var(--amber); }
  .copy-btn svg{
	    width: 14px;
	      height: 14px;
	        flex-shrink: 0;
  }

  /* ---- waveform-style bar visual instead of wheel ---- */
  .stage{
    display:flex;
    align-items:flex-end;
    gap: 2px;
    height: 84px;
    margin-bottom: 22px;
    padding: 0 2px;
  }
  .bar{
    flex:1;
    background: var(--panel-line);
    border-radius: 2px 2px 0 0;
    transition: background 0.2s ease;
  }
  .bar.played{ background: var(--amber); }

  .time-row{
    display:flex;
    justify-content:space-between;
    font-size: 11px;
    color: var(--text-dim);
    margin-bottom: 22px;
  }
  .time-row span:last-child{ color: var(--text-dim); }

  /* ---- transport ---- */
  .transport{
    display:flex;
    align-items:center;
    justify-content:center;
    gap: 22px;
    margin-bottom: 8px;
  }
  .tbtn{
    background: none;
    border: none;
    color: var(--text-dim);
    cursor: pointer;
    display:flex; align-items:center; justify-content:center;
    transition: color 0.15s ease, transform 0.1s ease;
  }
  .tbtn:hover{ color: var(--amber); }
  .tbtn:active{ transform: scale(0.92); }
  .tbtn svg{ width:16px; height:16px; }
  .tbtn.play{
    width: 46px; height: 46px;
    border: 1px solid var(--panel-line);
    border-radius: 4px;
    color: var(--amber);
  }
  .tbtn.play:hover{ background: rgba(201,133,83,0.08); border-color: var(--amber); }
  .tbtn.play svg{ width:20px; height:20px; }

  .loop-row{
    display:flex;
    justify-content:center;
    padding: 16px 0 22px;
  }
  .loop-row button{
    font-family: var(--mono);
    font-size: 10.5px;
    letter-spacing: 0.06em;
    background: none;
    border: 1px solid var(--panel-line);
    color: var(--text-dim);
    padding: 5px 12px;
    border-radius: 3px;
    cursor: pointer;
  }
  .loop-row button.on{ color: var(--sage); border-color: var(--sage); }

  /* ---- status bar, mimicking the neovim statusline ---- */
  .statusline{
    display:flex;
    align-items:center;
    justify-content:space-between;
    background: var(--panel);
    border-top: 1px solid var(--panel-line);
    padding: 6px 14px;
    font-size: 10.5px;
  }
  .status-left{ display:flex; align-items:center; gap: 10px; }
  .mode{
    background: var(--statusbar);
    color: #17140F;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 3px;
    letter-spacing: 0.05em;
  }
  .status-mid{ color: var(--text-dim); }
  .status-right{ color: var(--text-dim); display:flex; gap: 12px; }
  .status-right .site{ color: var(--amber); }
  .src-link{
	    display:flex;
	      align-items:center;
	        gap: 5px;
		  color: var(--text-dim);
		    text-decoration: none;
		      transition: color 0.15s ease;
  }
  .src-link:hover{ color: var(--amber); }
  .volume-row{
	    display:flex;
	      align-items:center;
	        gap: 6px;
		  color: var(--text-dim);
		    padding-bottom: 20px;
  }
  .volume-row input[type="range"]{
	    width: 120px;
	      height: 6px;
	        accent-color: var(--amber);
		  cursor: pointer;
  }
  @media (max-width: 480px){
	    body{ padding: 10px; }
	      .app{ max-width: 100%; }
	        .body-pad{ padding: 22px 16px 16px; }
		  .tabs{ font-size: 11px; }
		    .tab{ padding: 9px 12px; }
		      .stage{ gap: 3px; }
		        .transport{ gap: 16px; }
			  .volume-row{ display: none; }
			    .state-track{ display: none; }
  }	
  @media (max-width: 900px){
	  .backdrop{
		  background-size: cover;
		  background-position: center;
	  }
  }
  .also-building{
	    text-align: center;
	      font-size: 10.5px;
	        color: var(--text-dim);
		  padding: 10px 0 10px;
  }
  .also-building a{
	    color: var(--text-dim);
	      text-decoration: none;
	        border-bottom: 1px dotted var(--panel-line);
  }
  .also-building a:hover{ color: var(--amber); border-color: var(--amber); }
</style>
</head>
<body>
<div class="backdrop"></div>

<div class="app">
  <div class="tabs" id="tabs"></div>

  <div class="body-pad">
	  <div class="comment">findingfocus.music <span id="trackCount"></span></div>
	  <div class="now-playing"><span class="kw" id="trackTitle">orbit study</span></div>
	  <div class="code-line" id="trackSub"></div>
	  <div class="code-overlay" id="codeOverlay">
		    <div class="code-overlay-box">
			    <button id="copyBtn" class="copy-btn" title="Copy to clipboard">
				      <svg viewBox="0 0 16 16" width="14" height="14" fill="currentColor">
					          <path d="M0 6.75C0 5.784.784 5 1.75 5h1.5a.75.75 0 010 1.5h-1.5a.25.25 0 00-.25.25v7.5c0 .138.112.25.25.25h7.5a.25.25 0 00.25-.25v-1.5a.75.75 0 011.5 0v1.5A1.75 1.75 0 019.25 16h-7.5A1.75 1.75 0 010 14.25v-7.5z"/>
						      <path d="M5 1.75C5 .784 5.784 0 6.75 0h7.5C15.216 0 16 .784 16 1.75v7.5A1.75 1.75 0 0114.25 11h-7.5A1.75 1.75 0 015 9.25v-7.5zM6.75 1.5a.25.25 0 00-.25.25v7.5c0 .138.112.25.25.25h7.5a.25.25 0 00.25-.25v-7.5a.25.25 0 00-.25-.25h-7.5z"/>
						        </svg>
			    </button>
				    <div id="codeOverlayText"></div>
				      </div>
	  </div>
	  <div class="stage" id="stage"></div>
	  <div class="time-row">
      <span id="curTime">0:00</span>
      <span id="durTime">0:00</span>
    </div>

    <div class="volume-row">
	      <svg viewBox="0 0 24 24" fill="currentColor" width="12" height="12"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1-3.29-2.5-4.03v8.05c1.5-.73 2.5-2.25 2.5-4.02z"/></svg>
	        <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="1">
    </div>

    <div class="transport">
      <button class="tbtn" id="prevBtn" title="Previous">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
      </button>
      <button class="tbtn play" id="playBtn" title="Play">
        <svg id="playIcon" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
      </button>
      <button class="tbtn" id="nextBtn" title="Next">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M16 6h2v12h-2zM6 6v12l8.5-6z"/></svg>
      </button>
    </div>

    <div class="loop-row">
      <button id="loopBtn" class="on" data-mode="all">loop: all tracks</button>
    </div>
  </div>

  <div class="statusline">
    <div class="status-left">
      <a href="https://tidalcycles.org" style="text-decoration: none;"><span class="mode" id="modeTag">TIDAL</span></a>
      <span class="status-mid" id="stateTag">paused</span>
    </div>
    <div class="status-right">
      <a href="https://github.com/findingfocus/tidal" target="_blank" rel="noopener" class="src-link" title="View Source Code">
	        <svg viewBox="0 0 16 16" width="13" height="13" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
		  source code
      </a>
      <span class="site">findingfocus.music</span>
    </div>
  </div>
  <div class="also-building">also building: <a href="https://tashio.dev" target="_blank" rel="noopener">tashio.dev</a> &middot; <a href="https://findingfocus.gg" target="_blank" rel="noopener">findingfocus.gg</a></div>
</div>

<script>
/* ---------------------------------------------------------------
   REPLACE these with your own CDN URLs (R2 / Bunny) once tracks
   are uploaded. title/sub are just labels shown in the UI.
--------------------------------------------------------------- */
const tracks = [
	{ title: "orbit study",    sub: ['d1 $ sound "bd sn"'],              url: "track1.mp3", peaks: [94, 87.36, 76.97, 68.37, 56.53, 55.52, 57.46, 56.66, 73.89, 84.46, 90.49, 89.29, 87.75, 70.55, 54.39, 45.77, 39.13, 35.72, 59.78, 72.43, 80.55, 86.64, 89.93, 67.72, 49.36, 39.84, 29.02, 22.83, 50.62, 64.89, 70.32, 76.2, 80.55, 65.5, 56.02, 48.58, 37.67, 34.73, 40.87, 43.64, 45.91, 55, 58.54, 44.1, 36.52, 36.94, 27.1, 26.82, 39.27, 48.72, 56.97, 64.92, 71.47, 70.93, 68.29, 59.38, 52.37, 50.55, 49.73, 49.21, 50.45, 48.93, 51.73, 52.1, 52.75, 58.14, 66.22, 68.14, 64.69, 61.72, 57.84, 49.88, 42.75, 40.13, 37.85, 39.67, 38.46, 21.66, 7.5, 6] },
	{
		title: "glass patterns",
		sub: [
			'd1 $ slow 8 $ jux rev $ off 0.25 (|- n 12) $ off 0.125 (|+ n 7) $ n "<c g> <a ~> d(3,8,2) e" # sound "superpiano" # legato 4 # cutoff 300',
			'd2 $ chunk 4 (hurry 2) $ every 3 (#crush 4) $ sound "kick:8*2 clap:4" # cutoff 600'
		],
		url: "track2.mp3", peaks: [47.49, 59.79, 39.6, 51.97, 32.79, 60.58, 50.99, 77.74, 64.75, 53.44, 52.28, 42.12, 50.9, 49.56, 73.34, 46.36, 64.06, 19.78, 43.44, 17.51, 67.23, 53.94, 94, 59.84, 70.31, 32.23, 38.06, 28.76, 61.58, 66.3, 74.89, 79.32, 48.14, 46.13, 25.3, 43.63, 30.16, 70.44, 43.85, 72.56, 32.09, 60.99, 37.62, 70.78, 59.97, 85.23, 54.91, 55.81, 37.88, 40.95, 45.88, 63.36, 83.57, 65.56, 69.67, 28.41, 36.42, 6, 46.92, 36.99, 88.98, 58.78, 83.59, 41.96, 53.3, 32.82, 58.59, 50.86, 77.85, 64.65, 52.88, 51.94, 41.5, 50.2, 48.78, 73.17, 45.24, 62.49, 42.95, 50.39] },
	{ title: "low tide", sub: [
		  'd1 $ slow 8 $ jux rev $ off 0.25 (|- n 12) $ n "c e g" # sound "piano" # legato 3',
		  'd2 $ chunk 4 (hurry 2) $ every 3 (# crush 4) $ sound "kick:8*2 clap:4" # cutoff 600',
		  'd3 $ n "0 2 4 7" # s "arpy" # room 0.4 # size 0.6',
		  'd4 $ slow 4 $ n "<0 3 5 7>" # s "pad" # attack 2 # release 4',
		  'd5 $ degradeBy 0.3 $ sound "hh*16" # gain 0.6',
		  'd6 $ jux (iter 4) $ n (run 8) # s "gtr" # legato 1.5',
		  'd7 $ someCyclesBy 0.2 (# speed 2) $ sound "bd*4"',
		  'd8 $ off 0.125 (|+ n 12) $ n "0 .. 7" # s "bell"',
		  'd9 $ chop 4 $ sound "vinyl" # speed (slow 8 $ sine)',
		  'd10 $ striate 8 $ sound "breaks125" # cutoff 1200',
		  'd11 $ n "a(3,8) f*2 d(3,8,2) [~ e*2]" # sound "superpiano" # gain 0.7',
		  'd12 $ every 4 (rev) $ n "0 1 2 3 4 5 6 7" # s "marimba"',
		  'd13 $ ply 2 $ sound "cp*2 ~ cp ~" # room 0.3',
		  'd14 $ segment 8 $ range 0 12 sine # s "sine" # n',
		  'd15 $ within (0, 0.5) (fast 2) $ sound "arpy*4" # pan sine',
		  'd16 $ sometimesBy 0.4 (# vowel "a") $ n "0 3 5 7" # s "voice"',
		  'd17 $ swingBy (1/3) 4 $ sound "hh*8" # gain 0.5',
		  'd18 $ inv "1 0 1 1" # sound "bd" # n (irand 4)',
		  'd19 $ scan 4 # s "arpy" # note "0 .. 3"',
		  'd20 $ n (scale "minor" "0 2 4 6 8") # s "flute" # release 0.8'
		],      url: "track1.mp3" },
];

let current = 0;
let loopMode = "all";
const audio = new Audio();
audio.preload = "metadata";

const playBtn = document.getElementById('playBtn');
const playIcon = document.getElementById('playIcon');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');
const loopBtn = document.getElementById('loopBtn');
const tabsEl = document.getElementById('tabs');
const stageEl = document.getElementById('stage');
const curTime = document.getElementById('curTime');
const durTime = document.getElementById('durTime');
const trackTitle = document.getElementById('trackTitle');
const trackSub = document.getElementById('trackSub');
const stateTag = document.getElementById('stateTag');

const BAR_COUNT = 80;
let barHeights = Array.from({length: BAR_COUNT}, () => 30); // flat placeholder until real waveform loads
let audioCtx = null;
let waveformRequestId = 0; // guards against a slow decode overwriting a newer track's bars

function renderTabs(){
  tabsEl.innerHTML = "";
  tracks.forEach((t, i) => {
    const tab = document.createElement('div');
    tab.className = 'tab' + (i === current ? ' active' : '');
    tab.innerHTML = `<span class="dot"></span>${t.title.replace(/\s+/g,'_')}.mp3`;
    tab.addEventListener('click', () => loadTrack(i, !audio.paused));
    tabsEl.appendChild(tab);
  });
}

function renderStage(){
  stageEl.innerHTML = "";
  barHeights.forEach((h) => {
    const bar = document.createElement('div');
    bar.className = 'bar';
    bar.style.height = h + '%';
    stageEl.appendChild(bar);
  });
}

// Construct waveform based on peaks array
function loadWaveform(track){
	  barHeights = track.peaks || Array.from({length: BAR_COUNT}, () => 6);
	  renderStage();
}

const volumeSlider = document.getElementById('volumeSlider');
volumeSlider.addEventListener('input', () => {
	  audio.volume = volumeSlider.value;
});

document.addEventListener('keydown', (e) => {
	  if (e.code === 'Space' && e.target.tagName !== 'INPUT') {
		      e.preventDefault();
		      playBtn.click();
		    }
});

document.getElementById('trackCount').textContent = `[${current + 1}/${tracks.length}]`;

function formatTime(sec){
  if (!isFinite(sec)) return "0:00";
  const m = Math.floor(sec / 60);
  const s = Math.floor(sec % 60).toString().padStart(2, '0');
  return `${m}:${s}`;
}

function updateMediaSession(track){
	  if (!('mediaSession' in navigator)) return; // unsupported browser, skip quietly

	  navigator.mediaSession.metadata = new MediaMetadata({
		      title: track.title,
		      artist: 'findingfocus',
		      album: 'findingfocus.music',
		      artwork: [
			            { src: 'ff-96.png',  sizes: '96x96',   type: 'image/png' },
			            { src: 'ff-256.png', sizes: '256x256', type: 'image/png' },
			            { src: 'ff-512.png', sizes: '512x512', type: 'image/png' },
			          ]
		    });

	  navigator.mediaSession.setActionHandler('play', () => audio.play());
	  navigator.mediaSession.setActionHandler('pause', () => audio.pause());
	  navigator.mediaSession.setActionHandler('previoustrack', () => prevBtn.click());
	  navigator.mediaSession.setActionHandler('nexttrack', () => nextBtn.click());
}

function loadTrack(i, autoplay){
	  current = i;
	  const t = tracks[current];
	  audio.src = t.url || "";
	  trackTitle.textContent = t.title;
	  trackSub.textContent = t.sub[0];
	  trackSub.dataset.full = t.sub.join('\n\n');
	  document.getElementById('trackCount').textContent = `[${current + 1}/${tracks.length}]`;
	  renderTabs();
	  loadWaveform(t);
	  updateMediaSession(t);  
	  if (autoplay) audio.play().catch(()=>{});
}

// Click-to-seek: figure out what fraction of the stage width was clicked,
// then jump the audio to that fraction of its duration.
stageEl.addEventListener('click', (e) => {
  if (!audio.duration || !isFinite(audio.duration)) return;
  const rect = stageEl.getBoundingClientRect();
  const pct = Math.min(Math.max((e.clientX - rect.left) / rect.width, 0), 1);
  audio.currentTime = pct * audio.duration;
});
stageEl.style.cursor = 'pointer';

audio.addEventListener('timeupdate', () => {
  const pct = audio.duration ? audio.currentTime / audio.duration : 0;
  const litCount = Math.floor(pct * BAR_COUNT);
  [...stageEl.children].forEach((bar, i) => {
    bar.classList.toggle('played', i < litCount);
  });
  curTime.textContent = formatTime(audio.currentTime);
  durTime.textContent = formatTime(audio.duration);
});

audio.addEventListener('ended', () => {
  if (loopMode === 'one') {
    audio.currentTime = 0;
    audio.play();
  } else {
    loadTrack((current + 1) % tracks.length, true);
  }
});

playBtn.addEventListener('click', () => {
  if (audio.paused) {
    if (!audio.src) loadTrack(current, false);
    audio.play().catch(()=>{});
  } else {
    audio.pause();
  }
});
audio.addEventListener('play', () => {
	  document.getElementById('playIcon').outerHTML = '<svg id="playIcon" viewBox="0 0 24 24" fill="currentColor"><path d="M6 5h4v14H6zm8 0h4v14h-4z"/></svg>';
	  stateTag.innerHTML = 'playing <span class="state-track">&gt; ' + tracks[current].title.replace(/\s+/g,'_') + '.wav</span>';
});
audio.addEventListener('pause', () => {
  document.getElementById('playIcon').outerHTML = '<svg id="playIcon" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>';
  stateTag.textContent = 'paused';
});

prevBtn.addEventListener('click', () => {
  loadTrack((current - 1 + tracks.length) % tracks.length, !audio.paused);
});
nextBtn.addEventListener('click', () => {
  loadTrack((current + 1) % tracks.length, !audio.paused);
});

loopBtn.addEventListener('click', () => {
  loopMode = loopMode === 'all' ? 'one' : 'all';
  loopBtn.textContent = loopMode === 'all' ? 'loop: all tracks' : 'loop: this track';
  loopBtn.classList.toggle('on', true);
});

renderTabs();
renderStage();
loadTrack(0, false);

trackSub.addEventListener('click', () => {
	  document.getElementById('codeOverlayText').textContent = trackSub.dataset.full;
	  document.getElementById('codeOverlay').classList.add('show');
});
document.getElementById('codeOverlay').addEventListener('click', () => {
	  document.getElementById('codeOverlay').classList.remove('show');
});
document.getElementById('copyBtn').addEventListener('click', (e) => {
	  e.stopPropagation();
	  navigator.clipboard.writeText(document.getElementById('codeOverlayText').textContent);
	  const btn = document.getElementById('copyBtn');
	  const original = btn.innerHTML;
	  btn.innerHTML = '<svg viewBox="0 0 16 16" width="14" height="14" fill="currentColor"><path d="M13.78 4.22a.75.75 0 010 1.06l-7.25 7.25a.75.75 0 01-1.06 0L2.22 9.28a.75.75 0 011.06-1.06L6 10.94l6.72-6.72a.75.75 0 011.06 0z"/></svg>';
	  setTimeout(() => { btn.innerHTML = original; }, 1200);
});
</script>

</body>
</html>
